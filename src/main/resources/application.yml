server:
  port: "${SERVER_PORT:8081}"
  shutdown: graceful

spring:
  application:
    name: "${APPLICATION_NAME:panel}"
  main:
    allow-bean-definition-overriding: false
    allow-circular-references: false
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: "${SHUTDOWN_TIMEOUT:30s}"
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: "${PAYMENT_RECEIPT_MAX_FILE_SIZE_BYTES:5242880}"
      max-request-size: "${PAYMENT_RECEIPT_MAX_REQUEST_SIZE_BYTES:6291456}"
  datasource:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: "${DB_POOL_NAME:PanelHikariPool}"
      maximum-pool-size: "${DB_POOL_MAX_SIZE:10}"
      minimum-idle: "${DB_POOL_MIN_IDLE:2}"
      connection-timeout: "${DB_CONNECTION_TIMEOUT_MS:30000}"
      idle-timeout: "${DB_IDLE_TIMEOUT_MS:600000}"
      max-lifetime: "${DB_MAX_LIFETIME_MS:1800000}"
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: "${spring.application.name}"

logging:
  level:
    root: INFO
    com.parazit.panel: INFO

app:
  database:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
  telegram:
    enabled: "${TELEGRAM_ENABLED:false}"
    bot-token: "${BOT_TOKEN}"
  panel:
    enabled: "${PANEL_ENABLED:false}"
    url: "${PANEL_URL}"
    username: "${PANEL_USERNAME}"
    password: "${PANEL_PASSWORD}"
  payment:
    enabled: "${PAYMENT_ENABLED:false}"
    merchant-id: "${PAYMENT_MERCHANT_ID}"
    default-expiration: "${PAYMENT_DEFAULT_EXPIRATION:PT30M}"
    zarinpal:
      enabled: "${ZARINPAL_ENABLED:false}"
      merchant-id: "${ZARINPAL_MERCHANT_ID:}"
      api-base-url: "${ZARINPAL_API_BASE_URL:https://api.zarinpal.com}"
      start-pay-base-url: "${ZARINPAL_STARTPAY_BASE_URL:https://www.zarinpal.com/pg/StartPay}"
      request-path: "${ZARINPAL_REQUEST_PATH:/pg/v4/payment/request.json}"
      verify-path: "${ZARINPAL_VERIFY_PATH:/pg/v4/payment/verify.json}"
      callback-base-url: "${ZARINPAL_CALLBACK_BASE_URL:http://localhost:8081/api/payments/zarinpal/callback}"
      success-redirect-url: "${ZARINPAL_SUCCESS_REDIRECT_URL:http://localhost:8081/internal/payment-result/success}"
      failure-redirect-url: "${ZARINPAL_FAILURE_REDIRECT_URL:http://localhost:8081/internal/payment-result/failed}"
      cancel-redirect-url: "${ZARINPAL_CANCEL_REDIRECT_URL:http://localhost:8081/internal/payment-result/cancelled}"
      connect-timeout: "${ZARINPAL_CONNECT_TIMEOUT:PT5S}"
      read-timeout: "${ZARINPAL_READ_TIMEOUT:PT20S}"
      max-transient-retries: "${ZARINPAL_MAX_TRANSIENT_RETRIES:0}"
      retry-delay: "${ZARINPAL_RETRY_DELAY:PT1S}"
      sandbox-enabled: "${ZARINPAL_SANDBOX_ENABLED:false}"
      verify-ssl: "${ZARINPAL_VERIFY_SSL:true}"
    manual-card:
      enabled: "${MANUAL_CARD_PAYMENT_ENABLED:false}"
      instruction-ttl: "${MANUAL_CARD_PAYMENT_TTL:PT30M}"
      minimum-suffix: "${MANUAL_CARD_SUFFIX_MIN:101}"
      maximum-suffix: "${MANUAL_CARD_SUFFIX_MAX:4999}"
      max-generation-attempts: "${MANUAL_CARD_SUFFIX_MAX_ATTEMPTS:20}"
      destination-id: "${MANUAL_CARD_DESTINATION_ID:PRIMARY_CARD}"
      bank-name: "${MANUAL_CARD_BANK_NAME:}"
      card-holder-name: "${MANUAL_CARD_HOLDER_NAME:}"
      card-number: "${MANUAL_CARD_NUMBER:}"
      allow-instruction-reissue: "${MANUAL_CARD_ALLOW_REISSUE:true}"
      reissue-cooldown: "${MANUAL_CARD_REISSUE_COOLDOWN:PT2M}"
    receipt-storage:
      enabled: "${PAYMENT_RECEIPT_STORAGE_ENABLED:true}"
      provider: "${PAYMENT_RECEIPT_STORAGE_PROVIDER:local}"
      local-root: "${PAYMENT_RECEIPT_LOCAL_ROOT:/tmp/panel/manual-payment-receipts}"
      max-file-size-bytes: "${PAYMENT_RECEIPT_MAX_FILE_SIZE_BYTES:5242880}"
      allowed-content-types: "${PAYMENT_RECEIPT_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,application/pdf}"
      allowed-extensions: "${PAYMENT_RECEIPT_ALLOWED_EXTENSIONS:jpg,jpeg,png,pdf}"
      allow-pdf: "${PAYMENT_RECEIPT_ALLOW_PDF:true}"
      image-max-width: "${PAYMENT_RECEIPT_IMAGE_MAX_WIDTH:5000}"
      image-max-height: "${PAYMENT_RECEIPT_IMAGE_MAX_HEIGHT:5000}"
      upload-timeout: "${PAYMENT_RECEIPT_UPLOAD_TIMEOUT:PT30S}"
      calculate-sha256: "${PAYMENT_RECEIPT_CALCULATE_SHA256:true}"
    manual-review:
      claim-ttl: "${MANUAL_PAYMENT_REVIEW_CLAIM_TTL:PT15M}"
      queue-page-size: "${MANUAL_PAYMENT_REVIEW_QUEUE_PAGE_SIZE:50}"
      max-queue-page-size: "${MANUAL_PAYMENT_REVIEW_MAX_QUEUE_PAGE_SIZE:200}"
      require-tracking-number: "${MANUAL_PAYMENT_REVIEW_REQUIRE_TRACKING_NUMBER:false}"
      require-sender-card-last-four: "${MANUAL_PAYMENT_REVIEW_REQUIRE_SENDER_CARD_LAST_FOUR:false}"
      require-operator-note-on-approval: "${MANUAL_PAYMENT_REVIEW_REQUIRE_OPERATOR_NOTE_ON_APPROVAL:false}"
  provisioning:
    outbox:
      enabled: "${PROVISIONING_OUTBOX_ENABLED:false}"
      poll-interval: "${PROVISIONING_OUTBOX_POLL_INTERVAL:PT5S}"
      batch-size: "${PROVISIONING_OUTBOX_BATCH_SIZE:20}"
      max-attempts: "${PROVISIONING_OUTBOX_MAX_ATTEMPTS:10}"
      initial-retry-delay: "${PROVISIONING_OUTBOX_INITIAL_RETRY_DELAY:PT10S}"
      max-retry-delay: "${PROVISIONING_OUTBOX_MAX_RETRY_DELAY:PT15M}"
      retry-multiplier: "${PROVISIONING_OUTBOX_RETRY_MULTIPLIER:2.0}"
      processing-timeout: "${PROVISIONING_OUTBOX_PROCESSING_TIMEOUT:PT5M}"
  xui:
    base-url: "${XUI_BASE_URL:http://localhost:2053}"
    username: "${XUI_USERNAME:}"
    password: "${XUI_PASSWORD:}"
    connect-timeout: "${XUI_CONNECT_TIMEOUT:5s}"
    read-timeout: "${XUI_READ_TIMEOUT:20s}"
    login-timeout: "${XUI_LOGIN_TIMEOUT:10s}"
    max-retries: "${XUI_MAX_RETRIES:3}"
    retry-delay: "${XUI_RETRY_DELAY:1s}"
    verify-ssl: "${XUI_VERIFY_SSL:true}"
    auto-login: "${XUI_AUTO_LOGIN:true}"
    session-timeout: "${XUI_SESSION_TIMEOUT:PT30M}"
    inbound-list-path: "${XUI_INBOUND_LIST_PATH:/panel/api/inbounds/list}"
    client-create-path: "${XUI_CLIENT_CREATE_PATH:/panel/api/inbounds/addClient}"
    client-update-path-template: "${XUI_CLIENT_UPDATE_PATH_TEMPLATE:/panel/api/inbounds/updateClient/{clientId}}"
    client-delete-path-template: "${XUI_CLIENT_DELETE_PATH_TEMPLATE:/panel/api/inbounds/{inboundId}/delClient/{clientId}}"
    client-reset-traffic-path-template: "${XUI_CLIENT_RESET_TRAFFIC_PATH_TEMPLATE:/panel/api/clients/resetTraffic/{email}}"
    client-traffic-path-template: "${XUI_CLIENT_TRAFFIC_PATH_TEMPLATE:/panel/api/clients/traffic/{email}}"
    client-clear-ips-path-template: "${XUI_CLIENT_CLEAR_IPS_PATH_TEMPLATE:/panel/api/clients/clearIps/{email}}"
    subscription-id-length: "${XUI_SUBSCRIPTION_ID_LENGTH:16}"
  xui-client-provisioning:
    default-flow: "${XUI_CLIENT_DEFAULT_FLOW:xtls-rprx-vision}"
    reconciliation-attempts: "${XUI_CLIENT_RECONCILIATION_ATTEMPTS:1}"
  subscription:
    enabled: "${SUBSCRIPTION_ENABLED:true}"
    public-base-url: "${SUBSCRIPTION_PUBLIC_BASE_URL:http://localhost:8081}"
    token-bytes: "${SUBSCRIPTION_TOKEN_BYTES:32}"
    token-prefix-length: "${SUBSCRIPTION_TOKEN_PREFIX_LENGTH:12}"
    max-token-length: "${SUBSCRIPTION_MAX_TOKEN_LENGTH:160}"
    metadata-remote-timeout: "${SUBSCRIPTION_METADATA_REMOTE_TIMEOUT:PT5S}"
    include-usage-headers: "${SUBSCRIPTION_INCLUDE_USAGE_HEADERS:true}"
    allow-plain-format: "${SUBSCRIPTION_ALLOW_PLAIN_FORMAT:true}"
    allow-base64-format: "${SUBSCRIPTION_ALLOW_BASE64_FORMAT:true}"
    default-format: "${SUBSCRIPTION_DEFAULT_FORMAT:base64}"
    profile-title: "${SUBSCRIPTION_PROFILE_TITLE:Panel VPN}"
    profile-update-interval-hours: "${SUBSCRIPTION_PROFILE_UPDATE_INTERVAL_HOURS:24}"
    support-url: "${SUBSCRIPTION_SUPPORT_URL:http://localhost:8081/support}"
    endpoint:
      public-host: "${SUBSCRIPTION_PUBLIC_HOST:localhost}"
      override-port: "${SUBSCRIPTION_OVERRIDE_PORT:0}"
      default-fingerprint: "${SUBSCRIPTION_DEFAULT_FINGERPRINT:chrome}"
      default-remark-prefix: "${SUBSCRIPTION_DEFAULT_REMARK_PREFIX:Panel}"
      prefer-ipv6: "${SUBSCRIPTION_PREFER_IPV6:false}"
  referral:
    enabled: "${REFERRAL_ENABLED:true}"
    code-length: "${REFERRAL_CODE_LENGTH:10}"
  plan-selection:
    ttl: "${PLAN_SELECTION_TTL:PT30M}"
