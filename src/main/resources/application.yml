server:
  port: "${SERVER_PORT:8081}"
  shutdown: graceful

spring:
  application:
    name: "${APPLICATION_NAME:panel}"
  main:
    allow-bean-definition-overriding: false
    allow-circular-references: false
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: "${SHUTDOWN_TIMEOUT:30s}"
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: "${DB_POOL_NAME:PanelHikariPool}"
      maximum-pool-size: "${DB_POOL_MAX_SIZE:10}"
      minimum-idle: "${DB_POOL_MIN_IDLE:2}"
      connection-timeout: "${DB_CONNECTION_TIMEOUT_MS:30000}"
      idle-timeout: "${DB_IDLE_TIMEOUT_MS:600000}"
      max-lifetime: "${DB_MAX_LIFETIME_MS:1800000}"
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: "${spring.application.name}"

logging:
  level:
    root: INFO
    com.parazit.panel: INFO

app:
  database:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
  telegram:
    enabled: "${TELEGRAM_ENABLED:false}"
    bot-token: "${BOT_TOKEN}"
  panel:
    enabled: "${PANEL_ENABLED:false}"
    url: "${PANEL_URL}"
    username: "${PANEL_USERNAME}"
    password: "${PANEL_PASSWORD}"
  payment:
    enabled: "${PAYMENT_ENABLED:false}"
    merchant-id: "${PAYMENT_MERCHANT_ID}"
  xui:
    base-url: "${XUI_BASE_URL:http://localhost:2053}"
    username: "${XUI_USERNAME:}"
    password: "${XUI_PASSWORD:}"
    connect-timeout: "${XUI_CONNECT_TIMEOUT:5s}"
    read-timeout: "${XUI_READ_TIMEOUT:20s}"
    login-timeout: "${XUI_LOGIN_TIMEOUT:10s}"
    max-retries: "${XUI_MAX_RETRIES:3}"
    retry-delay: "${XUI_RETRY_DELAY:1s}"
    verify-ssl: "${XUI_VERIFY_SSL:true}"
    auto-login: "${XUI_AUTO_LOGIN:true}"
    session-timeout: "${XUI_SESSION_TIMEOUT:PT30M}"
  referral:
    enabled: "${REFERRAL_ENABLED:true}"
    code-length: "${REFERRAL_CODE_LENGTH:10}"
  plan-selection:
    ttl: "${PLAN_SELECTION_TTL:PT30M}"
