server:
  port: "${SERVER_PORT:8081}"
  shutdown: graceful

spring:
  application:
    name: "${APPLICATION_NAME:panel}"
  main:
    allow-bean-definition-overriding: false
    allow-circular-references: false
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: "${SHUTDOWN_TIMEOUT:30s}"
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: "${PAYMENT_RECEIPT_MAX_FILE_SIZE_BYTES:5242880}"
      max-request-size: "${PAYMENT_RECEIPT_MAX_REQUEST_SIZE_BYTES:6291456}"
  datasource:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: "${DB_POOL_NAME:PanelHikariPool}"
      maximum-pool-size: "${DB_POOL_MAX_SIZE:10}"
      minimum-idle: "${DB_POOL_MIN_IDLE:2}"
      connection-timeout: "${DB_CONNECTION_TIMEOUT_MS:30000}"
      idle-timeout: "${DB_IDLE_TIMEOUT_MS:600000}"
      max-lifetime: "${DB_MAX_LIFETIME_MS:1800000}"
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: "${spring.application.name}"

logging:
  level:
    root: INFO
    com.parazit.panel: INFO

app:
  database:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
  telegram:
    bot:
      enabled: "${TELEGRAM_BOT_ENABLED:false}"
      token: "${TELEGRAM_BOT_TOKEN:}"
      username: "${TELEGRAM_BOT_USERNAME:}"
      update-mode: "${TELEGRAM_BOT_UPDATE_MODE:LONG_POLLING}"
      polling-timeout: "${TELEGRAM_BOT_POLLING_TIMEOUT:PT30S}"
      polling-backoff: "${TELEGRAM_BOT_POLLING_BACKOFF:PT2S}"
      update-batch-size: "${TELEGRAM_BOT_UPDATE_BATCH_SIZE:50}"
      allowed-updates: "${TELEGRAM_BOT_ALLOWED_UPDATES:message,callback_query}"
      max-message-length: "${TELEGRAM_BOT_MAX_MESSAGE_LENGTH:4096}"
      max-callback-data-bytes: "${TELEGRAM_BOT_MAX_CALLBACK_DATA_BYTES:64}"
      api-connect-timeout: "${TELEGRAM_BOT_API_CONNECT_TIMEOUT:PT5S}"
      api-read-timeout: "${TELEGRAM_BOT_API_READ_TIMEOUT:PT35S}"
      max-retry-attempts: "${TELEGRAM_BOT_MAX_RETRY_ATTEMPTS:5}"
      initial-retry-delay: "${TELEGRAM_BOT_INITIAL_RETRY_DELAY:PT1S}"
      max-retry-delay: "${TELEGRAM_BOT_MAX_RETRY_DELAY:PT30S}"
      retry-multiplier: "${TELEGRAM_BOT_RETRY_MULTIPLIER:2.0}"
      send-qr-as-photo: "${TELEGRAM_BOT_SEND_QR_AS_PHOTO:true}"
      disable-link-preview: "${TELEGRAM_BOT_DISABLE_LINK_PREVIEW:true}"
      webhook-secret-token: "${TELEGRAM_BOT_WEBHOOK_SECRET_TOKEN:}"
      webhook-path: "${TELEGRAM_BOT_WEBHOOK_PATH:/telegram/webhook}"
      callback-signing-secret: "${TELEGRAM_BOT_CALLBACK_SIGNING_SECRET:}"
      callback-ttl: "${TELEGRAM_BOT_CALLBACK_TTL:PT15M}"
    menu:
      enabled: "${TELEGRAM_MENU_ENABLED:true}"
      persistent: "${TELEGRAM_MENU_PERSISTENT:true}"
      show-renewal: "${TELEGRAM_MENU_SHOW_RENEWAL:true}"
      show-trial: "${TELEGRAM_MENU_SHOW_TRIAL:true}"
      show-wallet: "${TELEGRAM_MENU_SHOW_WALLET:true}"
      show-tutorials: "${TELEGRAM_MENU_SHOW_TUTORIALS:true}"
      show-support: "${TELEGRAM_MENU_SHOW_SUPPORT:true}"
      show-tariffs: "${TELEGRAM_MENU_SHOW_TARIFFS:true}"
      show-payments-in-main-menu: "${TELEGRAM_MENU_SHOW_PAYMENTS_IN_MAIN_MENU:false}"
      show-settings-in-main-menu: "${TELEGRAM_MENU_SHOW_SETTINGS_IN_MAIN_MENU:false}"
      default-locale: "${TELEGRAM_MENU_DEFAULT_LOCALE:fa}"
    feature-placeholder:
      renewal-available: "${TELEGRAM_FEATURE_RENEWAL_AVAILABLE:false}"
      trial-available: "${TELEGRAM_FEATURE_TRIAL_AVAILABLE:false}"
      wallet-available: "${TELEGRAM_FEATURE_WALLET_AVAILABLE:false}"
      tutorials-available: "${TELEGRAM_FEATURE_TUTORIALS_AVAILABLE:true}"
      support-available: "${TELEGRAM_FEATURE_SUPPORT_AVAILABLE:true}"
    customer-account:
      enabled: "${TELEGRAM_CUSTOMER_ACCOUNT_ENABLED:true}"
      show-telegram-id: "${TELEGRAM_CUSTOMER_ACCOUNT_SHOW_TELEGRAM_ID:true}"
      show-registration-date: "${TELEGRAM_CUSTOMER_ACCOUNT_SHOW_REGISTRATION_DATE:true}"
      show-service-counts: "${TELEGRAM_CUSTOMER_ACCOUNT_SHOW_SERVICE_COUNTS:true}"
      show-paid-order-count: "${TELEGRAM_CUSTOMER_ACCOUNT_SHOW_PAID_ORDER_COUNT:true}"
      show-pending-payment-count: "${TELEGRAM_CUSTOMER_ACCOUNT_SHOW_PENDING_PAYMENT_COUNT:true}"
      show-unavailable-future-fields: "${TELEGRAM_CUSTOMER_ACCOUNT_SHOW_UNAVAILABLE_FUTURE_FIELDS:false}"
    customer-services:
      enabled: "${TELEGRAM_CUSTOMER_SERVICES_ENABLED:true}"
      page-size: "${TELEGRAM_CUSTOMER_SERVICES_PAGE_SIZE:5}"
      max-page-size: "${TELEGRAM_CUSTOMER_SERVICES_MAX_PAGE_SIZE:10}"
      search-minimum-length: "${TELEGRAM_CUSTOMER_SERVICES_SEARCH_MINIMUM_LENGTH:3}"
      search-maximum-length: "${TELEGRAM_CUSTOMER_SERVICES_SEARCH_MAXIMUM_LENGTH:64}"
      search-result-limit: "${TELEGRAM_CUSTOMER_SERVICES_SEARCH_RESULT_LIMIT:10}"
      search-conversation-ttl: "${TELEGRAM_CUSTOMER_SERVICES_SEARCH_CONVERSATION_TTL:PT5M}"
      usage-freshness-ttl: "${TELEGRAM_CUSTOMER_SERVICES_USAGE_FRESHNESS_TTL:PT30M}"
      minimum-refresh-interval: "${TELEGRAM_CUSTOMER_SERVICES_MINIMUM_REFRESH_INTERVAL:PT30S}"
      show-usage: "${TELEGRAM_CUSTOMER_SERVICES_SHOW_USAGE:true}"
      show-expired-services: "${TELEGRAM_CUSTOMER_SERVICES_SHOW_EXPIRED:true}"
      show-suspended-services: "${TELEGRAM_CUSTOMER_SERVICES_SHOW_SUSPENDED:true}"
      show-revoked-services: "${TELEGRAM_CUSTOMER_SERVICES_SHOW_REVOKED:true}"
      allow-vless-delivery: "${TELEGRAM_CUSTOMER_SERVICES_ALLOW_VLESS_DELIVERY:true}"
      allow-qr-delivery: "${TELEGRAM_CUSTOMER_SERVICES_ALLOW_QR_DELIVERY:true}"
      allow-subscription-delivery: "${TELEGRAM_CUSTOMER_SERVICES_ALLOW_SUBSCRIPTION_DELIVERY:true}"
    tutorials:
      enabled: "${TELEGRAM_TUTORIALS_ENABLED:true}"
      trusted-hosts: "${TELEGRAM_TUTORIALS_TRUSTED_HOSTS:github.com,play.google.com,apps.apple.com,apps.microsoft.com,microsoft.com}"
    faq:
      enabled: "${TELEGRAM_FAQ_ENABLED:true}"
      page-size: "${TELEGRAM_FAQ_PAGE_SIZE:6}"
    support:
      enabled: "${TELEGRAM_SUPPORT_ENABLED:true}"
      display-name: "${TELEGRAM_SUPPORT_DISPLAY_NAME:}"
      telegram-username: "${TELEGRAM_SUPPORT_TELEGRAM_USERNAME:}"
      email: "${TELEGRAM_SUPPORT_EMAIL:}"
      working-hours-text: "${TELEGRAM_SUPPORT_WORKING_HOURS_TEXT:}"
      response-time-text: "${TELEGRAM_SUPPORT_RESPONSE_TIME_TEXT:}"
      show-faq: "${TELEGRAM_SUPPORT_SHOW_FAQ:true}"
      show-direct-message: "${TELEGRAM_SUPPORT_SHOW_DIRECT_MESSAGE:false}"
      show-email: "${TELEGRAM_SUPPORT_SHOW_EMAIL:false}"
      unavailable-message: "${TELEGRAM_SUPPORT_UNAVAILABLE_MESSAGE:}"
  sales:
    new-purchase-enabled: "${SALES_NEW_PURCHASE_ENABLED:true}"
    renewal-enabled: "${SALES_RENEWAL_ENABLED:true}"
    trial-enabled: "${SALES_TRIAL_ENABLED:false}"
    manual-payment-enabled: "${SALES_MANUAL_PAYMENT_ENABLED:true}"
    online-payment-enabled: "${SALES_ONLINE_PAYMENT_ENABLED:false}"
    wallet-payment-enabled: "${SALES_WALLET_PAYMENT_ENABLED:true}"
    discount-code-enabled: "${SALES_DISCOUNT_CODE_ENABLED:false}"
    gift-code-enabled: "${SALES_GIFT_CODE_ENABLED:false}"
    purchase-disabled-message: "${SALES_PURCHASE_DISABLED_MESSAGE:}"
    manual-payment-disabled-message: "${SALES_MANUAL_PAYMENT_DISABLED_MESSAGE:}"
    online-payment-disabled-message: "${SALES_ONLINE_PAYMENT_DISABLED_MESSAGE:}"
    sales-resume-at: "${SALES_RESUME_AT:}"
  wallet:
    enabled: "${WALLET_ENABLED:true}"
    currency: "${WALLET_CURRENCY:IRT}"
    history-page-size: "${WALLET_HISTORY_PAGE_SIZE:10}"
    max-history-page-size: "${WALLET_MAX_HISTORY_PAGE_SIZE:50}"
    auto-create-on-user-registration: "${WALLET_AUTO_CREATE_ON_USER_REGISTRATION:false}"
    show-transaction-history: "${WALLET_SHOW_TRANSACTION_HISTORY:true}"
    show-top-up-placeholder: "${WALLET_SHOW_TOP_UP_PLACEHOLDER:true}"
    optimistic-retry-count: "${WALLET_OPTIMISTIC_RETRY_COUNT:3}"
    top-up:
      enabled: "${WALLET_TOP_UP_ENABLED:true}"
      currency: "${WALLET_TOP_UP_CURRENCY:IRT}"
      minimum-amount: "${WALLET_TOP_UP_MINIMUM_AMOUNT:1000}"
      maximum-amount: "${WALLET_TOP_UP_MAXIMUM_AMOUNT:10000000}"
      request-ttl: "${WALLET_TOP_UP_REQUEST_TTL:PT30M}"
      max-pending-requests-per-user: "${WALLET_TOP_UP_MAX_PENDING_REQUESTS_PER_USER:3}"
      manual-payment-enabled: "${WALLET_TOP_UP_MANUAL_PAYMENT_ENABLED:true}"
      online-payment-enabled: "${WALLET_TOP_UP_ONLINE_PAYMENT_ENABLED:false}"
    payment:
      enabled: "${WALLET_PAYMENT_ENABLED:true}"
      allow-new-subscription: "${WALLET_PAYMENT_ALLOW_NEW_SUBSCRIPTION:true}"
      allow-renewal: "${WALLET_PAYMENT_ALLOW_RENEWAL:true}"
      currency: "${WALLET_PAYMENT_CURRENCY:IRT}"
      minimum-purchase-amount: "${WALLET_PAYMENT_MINIMUM_PURCHASE_AMOUNT:0}"
      maximum-purchase-amount: "${WALLET_PAYMENT_MAXIMUM_PURCHASE_AMOUNT:0}"
      max-concurrent-attempts-per-user: "${WALLET_PAYMENT_MAX_CONCURRENT_ATTEMPTS_PER_USER:3}"
      payment-ttl: "${WALLET_PAYMENT_TTL:PT15M}"
  renewal:
    enabled: "${RENEWAL_ENABLED:true}"
    renewal-order-ttl: "${RENEWAL_ORDER_TTL:PT30M}"
    renewal-selection-ttl: "${RENEWAL_SELECTION_TTL:PT15M}"
    service-page-size: "${RENEWAL_SERVICE_PAGE_SIZE:5}"
    plan-page-size: "${RENEWAL_PLAN_PAGE_SIZE:5}"
    allow-active-subscription: "${RENEWAL_ALLOW_ACTIVE_SUBSCRIPTION:true}"
    allow-expired-subscription: "${RENEWAL_ALLOW_EXPIRED_SUBSCRIPTION:true}"
    allow-suspended-subscription: "${RENEWAL_ALLOW_SUSPENDED_SUBSCRIPTION:false}"
    default-traffic-policy: "${RENEWAL_DEFAULT_TRAFFIC_POLICY:RESET_TO_PLAN_LIMIT}"
    expiry-policy: "${RENEWAL_EXPIRY_POLICY:EXTEND_FROM_LATER_OF_NOW_OR_EXPIRY}"
    require-successful-provision: "${RENEWAL_REQUIRE_SUCCESSFUL_PROVISION:true}"
    require-remote-client-reference: "${RENEWAL_REQUIRE_REMOTE_CLIENT_REFERENCE:true}"
    maximum-concurrent-open-renewals-per-subscription: "${RENEWAL_MAX_OPEN_PER_SUBSCRIPTION:1}"
    worker:
      enabled: "${RENEWAL_WORKER_ENABLED:true}"
      poll-interval: "${RENEWAL_WORKER_POLL_INTERVAL:PT5S}"
      batch-size: "${RENEWAL_WORKER_BATCH_SIZE:10}"
      lock-timeout: "${RENEWAL_WORKER_LOCK_TIMEOUT:PT2M}"
      remote-timeout: "${RENEWAL_WORKER_REMOTE_TIMEOUT:PT20S}"
      max-attempts: "${RENEWAL_WORKER_MAX_ATTEMPTS:8}"
      initial-backoff: "${RENEWAL_WORKER_INITIAL_BACKOFF:PT10S}"
      max-backoff: "${RENEWAL_WORKER_MAX_BACKOFF:PT30M}"
      backoff-multiplier: "${RENEWAL_WORKER_BACKOFF_MULTIPLIER:2.0}"
      worker-id: "${RENEWAL_WORKER_ID:}"
      process-on-startup: "${RENEWAL_WORKER_PROCESS_ON_STARTUP:true}"
  panel:
    enabled: "${PANEL_ENABLED:false}"
    url: "${PANEL_URL}"
    username: "${PANEL_USERNAME}"
    password: "${PANEL_PASSWORD}"
  payment:
    enabled: "${PAYMENT_ENABLED:false}"
    merchant-id: "${PAYMENT_MERCHANT_ID}"
    default-expiration: "${PAYMENT_DEFAULT_EXPIRATION:PT30M}"
    zarinpal:
      enabled: "${ZARINPAL_ENABLED:false}"
      merchant-id: "${ZARINPAL_MERCHANT_ID:}"
      api-base-url: "${ZARINPAL_API_BASE_URL:https://api.zarinpal.com}"
      start-pay-base-url: "${ZARINPAL_STARTPAY_BASE_URL:https://www.zarinpal.com/pg/StartPay}"
      request-path: "${ZARINPAL_REQUEST_PATH:/pg/v4/payment/request.json}"
      verify-path: "${ZARINPAL_VERIFY_PATH:/pg/v4/payment/verify.json}"
      callback-base-url: "${ZARINPAL_CALLBACK_BASE_URL:http://localhost:8081/api/payments/zarinpal/callback}"
      success-redirect-url: "${ZARINPAL_SUCCESS_REDIRECT_URL:http://localhost:8081/internal/payment-result/success}"
      failure-redirect-url: "${ZARINPAL_FAILURE_REDIRECT_URL:http://localhost:8081/internal/payment-result/failed}"
      cancel-redirect-url: "${ZARINPAL_CANCEL_REDIRECT_URL:http://localhost:8081/internal/payment-result/cancelled}"
      connect-timeout: "${ZARINPAL_CONNECT_TIMEOUT:PT5S}"
      read-timeout: "${ZARINPAL_READ_TIMEOUT:PT20S}"
      max-transient-retries: "${ZARINPAL_MAX_TRANSIENT_RETRIES:0}"
      retry-delay: "${ZARINPAL_RETRY_DELAY:PT1S}"
      sandbox-enabled: "${ZARINPAL_SANDBOX_ENABLED:false}"
      verify-ssl: "${ZARINPAL_VERIFY_SSL:true}"
    manual-card:
      enabled: "${MANUAL_CARD_PAYMENT_ENABLED:false}"
      instruction-ttl: "${MANUAL_CARD_PAYMENT_TTL:PT30M}"
      minimum-suffix: "${MANUAL_CARD_SUFFIX_MIN:101}"
      maximum-suffix: "${MANUAL_CARD_SUFFIX_MAX:4999}"
      max-generation-attempts: "${MANUAL_CARD_SUFFIX_MAX_ATTEMPTS:20}"
      destination-id: "${MANUAL_CARD_DESTINATION_ID:PRIMARY_CARD}"
      bank-name: "${MANUAL_CARD_BANK_NAME:}"
      card-holder-name: "${MANUAL_CARD_HOLDER_NAME:}"
      card-number: "${MANUAL_CARD_NUMBER:}"
      allow-instruction-reissue: "${MANUAL_CARD_ALLOW_REISSUE:true}"
      reissue-cooldown: "${MANUAL_CARD_REISSUE_COOLDOWN:PT2M}"
    receipt-storage:
      enabled: "${PAYMENT_RECEIPT_STORAGE_ENABLED:true}"
      provider: "${PAYMENT_RECEIPT_STORAGE_PROVIDER:local}"
      local-root: "${PAYMENT_RECEIPT_LOCAL_ROOT:/tmp/panel/manual-payment-receipts}"
      max-file-size-bytes: "${PAYMENT_RECEIPT_MAX_FILE_SIZE_BYTES:5242880}"
      allowed-content-types: "${PAYMENT_RECEIPT_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,application/pdf}"
      allowed-extensions: "${PAYMENT_RECEIPT_ALLOWED_EXTENSIONS:jpg,jpeg,png,pdf}"
      allow-pdf: "${PAYMENT_RECEIPT_ALLOW_PDF:true}"
      image-max-width: "${PAYMENT_RECEIPT_IMAGE_MAX_WIDTH:5000}"
      image-max-height: "${PAYMENT_RECEIPT_IMAGE_MAX_HEIGHT:5000}"
      upload-timeout: "${PAYMENT_RECEIPT_UPLOAD_TIMEOUT:PT30S}"
      calculate-sha256: "${PAYMENT_RECEIPT_CALCULATE_SHA256:true}"
    manual-review:
      claim-ttl: "${MANUAL_PAYMENT_REVIEW_CLAIM_TTL:PT15M}"
      queue-page-size: "${MANUAL_PAYMENT_REVIEW_QUEUE_PAGE_SIZE:50}"
      max-queue-page-size: "${MANUAL_PAYMENT_REVIEW_MAX_QUEUE_PAGE_SIZE:200}"
      require-tracking-number: "${MANUAL_PAYMENT_REVIEW_REQUIRE_TRACKING_NUMBER:false}"
      require-sender-card-last-four: "${MANUAL_PAYMENT_REVIEW_REQUIRE_SENDER_CARD_LAST_FOUR:false}"
      require-operator-note-on-approval: "${MANUAL_PAYMENT_REVIEW_REQUIRE_OPERATOR_NOTE_ON_APPROVAL:false}"
  provisioning:
    outbox:
      enabled: "${PROVISIONING_OUTBOX_ENABLED:false}"
      poll-interval: "${PROVISIONING_OUTBOX_POLL_INTERVAL:PT5S}"
      batch-size: "${PROVISIONING_OUTBOX_BATCH_SIZE:20}"
      max-attempts: "${PROVISIONING_OUTBOX_MAX_ATTEMPTS:10}"
      initial-retry-delay: "${PROVISIONING_OUTBOX_INITIAL_RETRY_DELAY:PT10S}"
      max-retry-delay: "${PROVISIONING_OUTBOX_MAX_RETRY_DELAY:PT15M}"
      retry-multiplier: "${PROVISIONING_OUTBOX_RETRY_MULTIPLIER:2.0}"
      processing-timeout: "${PROVISIONING_OUTBOX_PROCESSING_TIMEOUT:PT5M}"
  xui:
    base-url: "${XUI_BASE_URL:http://localhost:2053}"
    username: "${XUI_USERNAME:}"
    password: "${XUI_PASSWORD:}"
    connect-timeout: "${XUI_CONNECT_TIMEOUT:5s}"
    read-timeout: "${XUI_READ_TIMEOUT:20s}"
    login-timeout: "${XUI_LOGIN_TIMEOUT:10s}"
    max-retries: "${XUI_MAX_RETRIES:3}"
    retry-delay: "${XUI_RETRY_DELAY:1s}"
    verify-ssl: "${XUI_VERIFY_SSL:true}"
    auto-login: "${XUI_AUTO_LOGIN:true}"
    session-timeout: "${XUI_SESSION_TIMEOUT:PT30M}"
    inbound-list-path: "${XUI_INBOUND_LIST_PATH:/panel/api/inbounds/list}"
    client-create-path: "${XUI_CLIENT_CREATE_PATH:/panel/api/inbounds/addClient}"
    client-update-path-template: "${XUI_CLIENT_UPDATE_PATH_TEMPLATE:/panel/api/inbounds/updateClient/{clientId}}"
    client-delete-path-template: "${XUI_CLIENT_DELETE_PATH_TEMPLATE:/panel/api/inbounds/{inboundId}/delClient/{clientId}}"
    client-reset-traffic-path-template: "${XUI_CLIENT_RESET_TRAFFIC_PATH_TEMPLATE:/panel/api/clients/resetTraffic/{email}}"
    client-traffic-path-template: "${XUI_CLIENT_TRAFFIC_PATH_TEMPLATE:/panel/api/clients/traffic/{email}}"
    client-clear-ips-path-template: "${XUI_CLIENT_CLEAR_IPS_PATH_TEMPLATE:/panel/api/clients/clearIps/{email}}"
    subscription-id-length: "${XUI_SUBSCRIPTION_ID_LENGTH:16}"
  xui-client-provisioning:
    default-flow: "${XUI_CLIENT_DEFAULT_FLOW:xtls-rprx-vision}"
    reconciliation-attempts: "${XUI_CLIENT_RECONCILIATION_ATTEMPTS:1}"
  subscription:
    enabled: "${SUBSCRIPTION_ENABLED:true}"
    public-base-url: "${SUBSCRIPTION_PUBLIC_BASE_URL:http://localhost:8081}"
    token-bytes: "${SUBSCRIPTION_TOKEN_BYTES:32}"
    token-prefix-length: "${SUBSCRIPTION_TOKEN_PREFIX_LENGTH:12}"
    max-token-length: "${SUBSCRIPTION_MAX_TOKEN_LENGTH:160}"
    metadata-remote-timeout: "${SUBSCRIPTION_METADATA_REMOTE_TIMEOUT:PT5S}"
    include-usage-headers: "${SUBSCRIPTION_INCLUDE_USAGE_HEADERS:true}"
    allow-plain-format: "${SUBSCRIPTION_ALLOW_PLAIN_FORMAT:true}"
    allow-base64-format: "${SUBSCRIPTION_ALLOW_BASE64_FORMAT:true}"
    default-format: "${SUBSCRIPTION_DEFAULT_FORMAT:base64}"
    profile-title: "${SUBSCRIPTION_PROFILE_TITLE:Panel VPN}"
    profile-update-interval-hours: "${SUBSCRIPTION_PROFILE_UPDATE_INTERVAL_HOURS:24}"
    support-url: "${SUBSCRIPTION_SUPPORT_URL:http://localhost:8081/support}"
    endpoint:
      public-host: "${SUBSCRIPTION_PUBLIC_HOST:localhost}"
      override-port: "${SUBSCRIPTION_OVERRIDE_PORT:0}"
      default-fingerprint: "${SUBSCRIPTION_DEFAULT_FINGERPRINT:chrome}"
      default-remark-prefix: "${SUBSCRIPTION_DEFAULT_REMARK_PREFIX:Panel}"
      prefer-ipv6: "${SUBSCRIPTION_PREFER_IPV6:false}"
    qr:
      enabled: "${SUBSCRIPTION_QR_ENABLED:true}"
      default-size: "${SUBSCRIPTION_QR_DEFAULT_SIZE:512}"
      min-size: "${SUBSCRIPTION_QR_MIN_SIZE:128}"
      max-size: "${SUBSCRIPTION_QR_MAX_SIZE:2048}"
      default-margin-modules: "${SUBSCRIPTION_QR_DEFAULT_MARGIN:4}"
      max-margin-modules: "${SUBSCRIPTION_QR_MAX_MARGIN:16}"
      default-error-correction: "${SUBSCRIPTION_QR_DEFAULT_ERROR_CORRECTION:MEDIUM}"
      default-format: "${SUBSCRIPTION_QR_DEFAULT_FORMAT:PNG}"
      allow-svg: "${SUBSCRIPTION_QR_ALLOW_SVG:false}"
      allow-transparent-background: "${SUBSCRIPTION_QR_ALLOW_TRANSPARENT_BACKGROUND:false}"
      max-payload-characters: "${SUBSCRIPTION_QR_MAX_PAYLOAD_CHARACTERS:4096}"
      generation-timeout: "${SUBSCRIPTION_QR_GENERATION_TIMEOUT:PT2S}"
      max-output-bytes: "${SUBSCRIPTION_QR_MAX_OUTPUT_BYTES:1048576}"
  referral:
    enabled: "${REFERRAL_ENABLED:true}"
    code-length: "${REFERRAL_CODE_LENGTH:10}"
  plan-selection:
    ttl: "${PLAN_SELECTION_TTL:PT30M}"
