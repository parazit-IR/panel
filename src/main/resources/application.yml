server:
  port: "${SERVER_PORT:8081}"
  shutdown: graceful

spring:
  application:
    name: "${APPLICATION_NAME:panel}"
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: "${SHUTDOWN_TIMEOUT:30s}"
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/panel_db}"
    username: "${DATABASE_USERNAME:panel}"
    password: "${DATABASE_PASSWORD:panel}"
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: "${spring.application.name}"

logging:
  level:
    root: INFO
    com.parazit.panel: INFO

app:
  database:
    url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/panel_db}"
    username: "${DATABASE_USERNAME:panel}"
    password: "${DATABASE_PASSWORD:panel}"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
  telegram:
    bot-token: "${BOT_TOKEN:}"
  panel:
    url: "${PANEL_URL:http://localhost:2053}"
    username: "${PANEL_USERNAME:admin}"
    password: "${PANEL_PASSWORD:admin}"
  payment:
    merchant-id: "${PAYMENT_MERCHANT_ID:}"
