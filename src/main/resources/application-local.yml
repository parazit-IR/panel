spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/panel_db}"
    username: "${DATABASE_USERNAME:panel}"
    password: "${DATABASE_PASSWORD:panel}"
    hikari:
      pool-name: "${DB_POOL_NAME:PanelLocalHikariPool}"
      maximum-pool-size: "${DB_POOL_MAX_SIZE:10}"
      minimum-idle: "${DB_POOL_MIN_IDLE:2}"
      connection-timeout: "${DB_CONNECTION_TIMEOUT_MS:30000}"
      idle-timeout: "${DB_IDLE_TIMEOUT_MS:600000}"
      max-lifetime: "${DB_MAX_LIFETIME_MS:1800000}"
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"

logging:
  level:
    root: INFO
    com.parazit.panel: DEBUG
    org.springframework.security: INFO

app:
  database:
    url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/panel_db}"
    username: "${DATABASE_USERNAME:panel}"
    password: "${DATABASE_PASSWORD:panel}"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
  telegram:
    enabled: "${TELEGRAM_ENABLED:false}"
    bot-token: "${BOT_TOKEN:}"
  panel:
    enabled: "${PANEL_ENABLED:false}"
    url: "${PANEL_URL:http://localhost:2053}"
    username: "${PANEL_USERNAME:admin}"
    password: "${PANEL_PASSWORD:admin}"
  payment:
    enabled: "${PAYMENT_ENABLED:false}"
    merchant-id: "${PAYMENT_MERCHANT_ID:}"
    default-expiration: "${PAYMENT_DEFAULT_EXPIRATION:PT30M}"
    zarinpal:
      enabled: "${ZARINPAL_ENABLED:false}"
      merchant-id: "${ZARINPAL_MERCHANT_ID:}"
      api-base-url: "${ZARINPAL_API_BASE_URL:http://localhost:18080}"
      start-pay-base-url: "${ZARINPAL_STARTPAY_BASE_URL:http://localhost:18080/pg/StartPay}"
      request-path: "${ZARINPAL_REQUEST_PATH:/pg/v4/payment/request.json}"
      verify-path: "${ZARINPAL_VERIFY_PATH:/pg/v4/payment/verify.json}"
      callback-base-url: "${ZARINPAL_CALLBACK_BASE_URL:http://localhost:8081/api/payments/zarinpal/callback}"
      success-redirect-url: "${ZARINPAL_SUCCESS_REDIRECT_URL:http://localhost:8081/internal/payment-result/success}"
      failure-redirect-url: "${ZARINPAL_FAILURE_REDIRECT_URL:http://localhost:8081/internal/payment-result/failed}"
      cancel-redirect-url: "${ZARINPAL_CANCEL_REDIRECT_URL:http://localhost:8081/internal/payment-result/cancelled}"
      connect-timeout: "${ZARINPAL_CONNECT_TIMEOUT:PT5S}"
      read-timeout: "${ZARINPAL_READ_TIMEOUT:PT20S}"
      max-transient-retries: "${ZARINPAL_MAX_TRANSIENT_RETRIES:0}"
      retry-delay: "${ZARINPAL_RETRY_DELAY:PT1S}"
      sandbox-enabled: "${ZARINPAL_SANDBOX_ENABLED:false}"
      verify-ssl: "${ZARINPAL_VERIFY_SSL:true}"
    manual-card:
      enabled: "${MANUAL_CARD_PAYMENT_ENABLED:false}"
      instruction-ttl: "${MANUAL_CARD_PAYMENT_TTL:PT30M}"
      minimum-suffix: "${MANUAL_CARD_SUFFIX_MIN:101}"
      maximum-suffix: "${MANUAL_CARD_SUFFIX_MAX:4999}"
      max-generation-attempts: "${MANUAL_CARD_SUFFIX_MAX_ATTEMPTS:20}"
      destination-id: "${MANUAL_CARD_DESTINATION_ID:PRIMARY_CARD}"
      bank-name: "${MANUAL_CARD_BANK_NAME:}"
      card-holder-name: "${MANUAL_CARD_HOLDER_NAME:}"
      card-number: "${MANUAL_CARD_NUMBER:}"
      allow-instruction-reissue: "${MANUAL_CARD_ALLOW_REISSUE:true}"
      reissue-cooldown: "${MANUAL_CARD_REISSUE_COOLDOWN:PT2M}"
  xui:
    base-url: "${XUI_BASE_URL:http://localhost:2053}"
    username: "${XUI_USERNAME:}"
    password: "${XUI_PASSWORD:}"
    connect-timeout: "${XUI_CONNECT_TIMEOUT:5s}"
    read-timeout: "${XUI_READ_TIMEOUT:20s}"
    login-timeout: "${XUI_LOGIN_TIMEOUT:10s}"
    max-retries: "${XUI_MAX_RETRIES:3}"
    retry-delay: "${XUI_RETRY_DELAY:1s}"
    verify-ssl: "${XUI_VERIFY_SSL:true}"
    auto-login: "${XUI_AUTO_LOGIN:true}"
    session-timeout: "${XUI_SESSION_TIMEOUT:PT30M}"
    inbound-list-path: "${XUI_INBOUND_LIST_PATH:/panel/api/inbounds/list}"
    client-create-path: "${XUI_CLIENT_CREATE_PATH:/panel/api/inbounds/addClient}"
    client-update-path-template: "${XUI_CLIENT_UPDATE_PATH_TEMPLATE:/panel/api/inbounds/updateClient/{clientId}}"
    client-delete-path-template: "${XUI_CLIENT_DELETE_PATH_TEMPLATE:/panel/api/inbounds/{inboundId}/delClient/{clientId}}"
    client-reset-traffic-path-template: "${XUI_CLIENT_RESET_TRAFFIC_PATH_TEMPLATE:/panel/api/clients/resetTraffic/{email}}"
    client-traffic-path-template: "${XUI_CLIENT_TRAFFIC_PATH_TEMPLATE:/panel/api/clients/traffic/{email}}"
    client-clear-ips-path-template: "${XUI_CLIENT_CLEAR_IPS_PATH_TEMPLATE:/panel/api/clients/clearIps/{email}}"
    subscription-id-length: "${XUI_SUBSCRIPTION_ID_LENGTH:16}"
  xui-client-provisioning:
    default-flow: "${XUI_CLIENT_DEFAULT_FLOW:xtls-rprx-vision}"
    reconciliation-attempts: "${XUI_CLIENT_RECONCILIATION_ATTEMPTS:1}"
  plan-selection:
    ttl: "${PLAN_SELECTION_TTL:PT30M}"
